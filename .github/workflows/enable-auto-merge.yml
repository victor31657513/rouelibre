name: Enable Pull Request Auto-Merge

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - closed

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: enable-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  enable-auto-merge:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == github.repository_owner &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      REPOSITORY: ${{ github.repository }}

    steps:
      - name: Enable auto-merge and dispatch deployment after merge
        shell: bash
        run: |
          set -euo pipefail

          deploy_merged_commit() {
            local merge_sha="$1"
            local existing_run=""

            echo "Merge commit SHA: ${merge_sha}"

            # A regular merge may create the push run concurrently. Briefly poll so
            # that this workflow does not dispatch a duplicate for the same commit.
            for attempt in 1 2 3 4 5; do
              existing_run="$({
                gh run list \
                  --repo "$REPOSITORY" \
                  --workflow deploy-pages.yml \
                  --commit "$merge_sha" \
                  --limit 1 \
                  --json databaseId,event,status,url \
                  --jq '.[0] // empty'
              })"

              if [[ -n "$existing_run" ]]; then
                echo "A Deploy Lab to GitHub Pages run already exists for ${merge_sha}: ${existing_run}"
                echo "No deployment was dispatched because this merge commit is already covered."
                return 0
              fi

              if [[ "$attempt" -lt 5 ]]; then
                echo "No deployment found for ${merge_sha} (check ${attempt}/5); retrying."
                sleep 2
              fi
            done

            gh workflow run deploy-pages.yml --repo "$REPOSITORY" --ref main
            echo "Deploy Lab to GitHub Pages was dispatched for main after confirmed merge ${merge_sha}."
          }

          read -r state auto_merge_enabled merge_sha < <(
            gh pr view "$PR_URL" \
              --json state,autoMergeRequest,mergeCommit \
              --jq '[.state, (.autoMergeRequest != null), (.mergeCommit.oid // "-")] | @tsv'
          )

          if [[ "$state" == "MERGED" ]]; then
            echo "Pull Request is already merged."
            if [[ "$merge_sha" == "-" ]]; then
              echo "Error: the merged Pull Request has no merge commit SHA." >&2
              exit 1
            fi
            deploy_merged_commit "$merge_sha"
            exit 0
          fi

          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "Auto-merge is already enabled."
            echo "No deployment was dispatched because the Pull Request is not merged."
            exit 0
          fi

          gh pr merge "$PR_URL" --auto --merge

          read -r state auto_merge_enabled merge_sha < <(
            gh pr view "$PR_URL" \
              --json state,autoMergeRequest,mergeCommit \
              --jq '[.state, (.autoMergeRequest != null), (.mergeCommit.oid // "-")] | @tsv'
          )

          if [[ "$state" == "MERGED" ]]; then
            echo "Pull Request was merged while enabling auto-merge."
            if [[ "$merge_sha" == "-" ]]; then
              echo "Error: the merged Pull Request has no merge commit SHA." >&2
              exit 1
            fi
            deploy_merged_commit "$merge_sha"
            exit 0
          fi

          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "Auto-merge was enabled; the Pull Request is not merged yet."
            echo "No deployment was dispatched because enabling auto-merge is not a confirmed merge."
            exit 0
          fi

          echo "Error: Pull Request remains open without auto-merge enabled." >&2
          echo "No deployment was dispatched because the Pull Request is not merged." >&2
          exit 1
