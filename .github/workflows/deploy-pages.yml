name: Deploy Lab to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Build and deploy lab to GitHub Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Determine Vite base path
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER}"
          repository="${GITHUB_REPOSITORY#*/}"

          if [ "${repository}" = "${owner}.github.io" ]; then
            base_path="/"
          else
            base_path="/${repository}/"
          fi

          echo "VITE_BASE_PATH=${base_path}" >> "${GITHUB_ENV}"
          echo "GitHub Pages Vite base path: ${base_path}"

      - name: Production build
        run: pnpm build

      - name: Verify lab build output
        run: test -f apps/lab/dist/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/lab/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
